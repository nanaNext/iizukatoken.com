map $http_x_forwarded_proto $do_redirect {
  default 1;
  https 0;
}

server {
  listen 80;
  server_name ${APP_SERVER_NAME} ${STAGING_SERVER_NAME};
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { if ($do_redirect) { return 301 https://$host$request_uri; } return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name ${APP_SERVER_NAME};

  ssl_certificate /etc/letsencrypt/live/${APP_SERVER_NAME}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/${APP_SERVER_NAME}/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;

  location / {
    proxy_pass http://$APP_BACKEND;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering on;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
  }
}

server {
  listen 443 ssl http2;
  server_name ${STAGING_SERVER_NAME};

  ssl_certificate /etc/letsencrypt/live/${STAGING_SERVER_NAME}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/${STAGING_SERVER_NAME}/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;

  auth_basic "Restricted";
  auth_basic_user_file /etc/nginx/htpasswd_staging;

  location / {
    proxy_pass http://api-staging:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering on;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
  }
}
